<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPMED V12 FINAL – CDSS BHYT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#0f172a; }
.card { background:#111827; border-radius:20px; padding:20px; }
.bad { background:#7f1d1d }
.warn { background:#78350f }
.good { background:#14532d }
</style>

</head>

<body class="p-6 text-white">

<div class="max-w-7xl mx-auto space-y-6">

<!-- HEADER -->
<div class="flex justify-between items-center">
<h1 class="text-2xl font-black">VPMED CDSS – SOÁT BHYT NGOẠI TRÚ</h1>
<input type="file" multiple onchange="handleFiles(this)" class="text-sm">
</div>

<div id="loading" class="hidden">Đang phân tích...</div>

<div id="app" class="space-y-6"></div>

</div>

<script>

// ================= DATABASE (MOCK CHUẨN LOGIC) =================

const DRUG_DB = {
"ESOMEPRAZOLE": {
    group:"PPI",
    bhyt:true,
    indications:["K21"],
    maxDose:40
},
"PARACETAMOL": {
    group:"Giảm đau",
    bhyt:true,
    indications:["J06"],
    maxDose:4000
},
"KALI": {
    group:"Điện giải",
    bhyt:false,
    indications:["E87"],
    maxDose:100
}
};

// ================= OCR =================

async function handleFiles(input){

document.getElementById("loading").classList.remove("hidden");

let text="";

for(let file of input.files){
const { data:{text:t} } = await Tesseract.recognize(file,'vie',{
tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-/ '
});
text += t.toUpperCase();
}

process(text);

}

// ================= CORE LOGIC =================

function process(text){

document.getElementById("loading").classList.add("hidden");

const lines = text.split("\n").map(x=>x.trim()).filter(x=>x);

// ICD
const icd = [...new Set(text.match(/[A-Z][0-9]{2}(\.[0-9]{1,2})?/g)||[])];

// DRUG PARSE
let drugs = [];

lines.forEach(l=>{
if(/\d+\s*(MG|ML|G)/.test(l)){
let name = l.split(/\d/)[0].trim();
let key = Object.keys(DRUG_DB).find(d=>name.includes(d));
drugs.push({
raw:name,
key:key,
data:DRUG_DB[key] || null
});
}
});

// ================= CHECK =================

let results = [];

drugs.forEach(d=>{

let bhyt = "❌";
let icdCheck = "❌";
let level = "bad";

if(d.data){

// BHYT
bhyt = d.data.bhyt ? "✅" : "❌";

// ICD
let match = icd.some(i=>d.data.indications.includes(i.substring(0,3)));

icdCheck = match ? "✅" : "⚠";

level = (!d.data.bhyt || !match) ? "bad" : "good";

}else{
level = "warn";
}

results.push({
name:d.raw,
group:d.data?.group || "Không rõ",
bhyt,
icdCheck,
level
});

});

// ================= GLOBAL RISK =================

let risk = "🟢 Hợp lý";

if(results.some(r=>r.level==="bad")){
risk = "🔴 Nguy cơ xuất toán";
}else if(results.some(r=>r.level==="warn")){
risk = "🟠 Cần kiểm tra";
}

// ================= RENDER =================

let html="";

// ICD
html += `
<div class="card">
<h2 class="font-bold mb-3 text-blue-400">ICD-10</h2>
<div class="flex flex-wrap gap-2">
${icd.map(i=>`<span class="bg-blue-600 px-3 py-1 rounded">${i}</span>`).join("")}
</div>
</div>
`;

// TABLE
html += `
<div class="card">
<h2 class="font-bold mb-3 text-green-400">BẢNG SOÁT THUỐC BHYT</h2>

<table class="w-full text-sm">
<thead class="text-gray-400">
<tr>
<th class="text-left">Thuốc</th>
<th>Nhóm</th>
<th>BHYT</th>
<th>Phù hợp ICD</th>
</tr>
</thead>

<tbody>
${results.map(r=>`
<tr class="${r.level}">
<td class="py-2">${r.name}</td>
<td class="text-center">${r.group}</td>
<td class="text-center">${r.bhyt}</td>
<td class="text-center">${r.icdCheck}</td>
</tr>
`).join("")}
</tbody>
</table>

</div>
`;

// RISK
html += `
<div class="card">
<h2 class="font-bold mb-2 text-red-400">KẾT LUẬN KIỂM SOÁT</h2>
<div class="text-lg font-black">${risk}</div>
</div>
`;

document.getElementById("app").innerHTML = html;

}

</script>

</body>
</html>
