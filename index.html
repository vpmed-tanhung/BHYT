<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VP MED V11.3 - ƯU TIÊN BIỆT DƯỢC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .brand-name { color: #1e40af; font-size: 14px; font-weight: 900; text-transform: uppercase; }
        .generic-name { color: #64748b; font-size: 10px; font-weight: 700; }
        .med-card { background: white; border-radius: 1.25rem; border: 2px solid #e2e8f0; transition: all 0.2s; }
        .med-card:hover { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <div class="bg-blue-900 p-8 rounded-[2.5rem] shadow-2xl text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">VPMed Tân Hưng</h1>
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-[0.3em]">ĐỐI SOÁT BHYT ( THAM KHẢO )</p>
            </div>
            <div class="flex space-x-2">
                <input type="file" id="file-in" multiple class="hidden" onchange="handleFiles(this)">
                <button onclick="document.getElementById('file-in').click()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg transition-all">Quét đơn mới</button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-20 font-black text-blue-900 animate-pulse text-[10px] uppercase">Hệ thống đang bóc tách biệt dược...</div>

        <div id="output" class="space-y-4">
            <div class="text-center py-40 text-slate-300 font-black uppercase text-[10px] tracking-widest">Vui lòng tải ảnh đơn thuốc</div>
        </div>
    </div>

    <script>
        async function handleFiles(input) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('output').innerHTML = "";
            let fullText = "";
            for(let file of Array.from(input.files)) {
                const { data: { text } } = await Tesseract.recognize(file, 'vie');
                fullText += "\n" + text;
            }
            document.getElementById('loading').classList.add('hidden');
            processV113(fullText);
        }

        function processV113(text) {
            // Làm sạch ký tự lạ OCR
            const cleanText = text.replace(/Ị/g, 'I').replace(/\|/g, 'I').replace(/!/g, 'I');
            const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l.length > 5);
            
            let meds = [];
            let currentMed = "";

            lines.forEach(line => {
                const up = line.toUpperCase();
                // BỎ QUA các dòng hướng dẫn sử dụng
                if (up.includes("UỐNG") || up.includes("NGÀY") || up.includes("LẦN") || up.includes("MỖI LẦN") || up.includes("CHIA")) return;

                // Nhận diện dòng chứa tên thuốc (có số thứ tự hoặc có đơn vị tính hoặc có biệt dược trong ngoặc)
                const isMed = /^\d+[\s.]/i.test(line) || /\d+\s*(VIÊN|ỐNG|GÓI|LỌ|MG|ML|G)/i.test(up) || up.includes('(');
                const isExtra = up.includes('DƯỚI DẠNG') || up.startsWith(')') || up.includes('PELLETS');

                if (isExtra && currentMed !== "") {
                    currentMed += " " + line;
                } else if (isMed) {
                    if(currentMed) meds.push(currentMed);
                    currentMed = line;
                }
            });
            if(currentMed) meds.push(currentMed);

            render(meds);
        }

        function render(meds) {
            const out = document.getElementById('output');
            if(meds.length === 0) {
                out.innerHTML = `<div class="text-center p-10 text-red-400 font-bold uppercase text-[10px]">Không tìm thấy thuốc. Hãy thử chụp rõ hơn.</div>`;
                return;
            }

            out.innerHTML = `<div class="bg-white p-4 border-b-2 border-slate-100 mb-4"><h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kết quả phân tích biệt dược</h3></div>`;
            
            meds.forEach(m => {
                // Tách Biệt dược (trong ngoặc) và Hoạt chất
                let brand = "";
                const brandMatch = m.match(/\(([^)]+)\)/);
                if(brandMatch) brand = brandMatch[1];

                // Làm sạch tên chung
                let generic = m.replace(/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|MG|ML|G).*$/i, "").replace(/^\d+[\s.]*/, "").trim();
                
                // Nếu không có biệt dược trong ngoặc, lấy 2 từ đầu tiên làm đại diện
                const displayTitle = brand ? brand : generic.split(' ').slice(0, 3).join(' ');

                out.innerHTML += `
                    <div class="med-card p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex-1">
                            <div class="brand-name mb-1">${displayTitle}</div>
                            <div class="generic-name">${generic}</div>
                            <div class="mt-3 flex items-center space-x-2">
                                <span class="bg-blue-50 text-blue-700 text-[8px] font-black px-2 py-0.5 rounded uppercase border border-blue-100">Dược thư QG 2024</span>
                                <span class="text-[8px] font-bold text-slate-300 uppercase">Thông tư 20/2022/TT-BYT</span>
                            </div>
                        </div>
                        <div class="shrink-0">
                            <span class="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[9px] font-black uppercase shadow-md">Phù hợp BHYT</span>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
