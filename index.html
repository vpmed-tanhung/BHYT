<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP MED V10.9 - TÂN HƯNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .icd-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 11px; border: 1px solid #1e40af; background: #eff6ff; color: #1e40af; display: inline-block; margin: 2px; }
        .evidence-line { font-size: 9px; font-weight: 700; color: #2563eb; text-transform: uppercase; margin-top: 4px; display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl flex justify-between items-center border-b-4 border-blue-600">
            <div class="flex items-center space-x-4">
                <div id="logo-container" class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg border-2 border-white overflow-hidden">
                    <img id="hospital-logo" src="" class="w-full h-full object-cover hidden">
                    <svg id="logo-default" viewBox="0 0 24 24" class="w-10 h-10 text-white" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-blue-900 uppercase leading-none tracking-tighter">Bệnh viện VPMed Tân Hưng</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1 italic">Hệ thống đối soát BHYT</p>
                </div>
            </div>
            <div id="ai-status" class="hidden flex items-center space-x-2 bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-ping"></div>
                <span class="text-[9px] font-black text-blue-700 uppercase">Đang truy vấn dữ liệu...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div onclick="document.getElementById('file-in').click()" class="bg-white p-8 rounded-[2rem] shadow-md border-2 border-dashed border-slate-300 hover:border-blue-500 transition-all cursor-pointer text-center group">
                    <input type="file" id="file-in" multiple accept="image/*" class="hidden" onchange="handleFiles(this)">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">TẢI ĐƠN THUỐC / BỆNH ÁN</p>
                </div>
                <button onclick="smartReset()" class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-4 rounded-2xl shadow-lg transition-all uppercase tracking-widest text-[10px]">Xóa dữ liệu cũ</button>
            </div>

            <div class="lg:col-span-9">
                <div class="bg-white rounded-[2.5rem] shadow-2xl p-8 min-h-[600px]">
                    <div id="analysis-zone" class="space-y-6 text-left">
                        <!-- Kết quả sẽ hiển thị ở đây -->
                        <div class="text-center py-40 text-slate-300 font-black uppercase text-[10px] tracking-[0.3em]">Đang chờ tệp tin...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allText = "";

        function smartReset() {
            allText = "";
            document.getElementById('analysis-zone').innerHTML = '<div class="text-center py-40 text-slate-300 font-black uppercase text-[10px] tracking-[0.3em]">Hệ thống đã làm mới</div>';
            document.getElementById('file-in').value = "";
        }

        async function handleFiles(input) {
            const files = Array.from(input.files);
            if(files.length === 0) return;
            document.getElementById('ai-status').classList.remove('hidden');
            allText = "";
            for(let file of files) {
                const { data: { text } } = await Tesseract.recognize(file, 'vie');
                allText += "\n" + text;
            }
            performAudit();
            document.getElementById('ai-status').classList.add('hidden');
        }

        function cleanMedName(line) {
            // Sửa lỗi ký tự OCR phổ biến
            let clean = line.replace(/Ị/g, 'I').replace(/!/g, 'I').replace(/\|/g, 'I').replace(/\[/g, 'I').toUpperCase();
            // Xóa số thứ tự đầu dòng (1., 2...)
            clean = clean.replace(/^\d+[\s.]*/, "");
            // Xóa phần định lượng cuối dòng để lấy Tên + Hoạt chất
            clean = clean.replace(/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|CHAI|HỘP|MG|ML|G).*$/i, "").trim();
            return clean;
        }

        function performAudit() {
            const raw = allText.toUpperCase();
            const lines = allText.split('\n');
            const zone = document.getElementById('analysis-zone');
            
            // Tìm tất cả mã ICD (Quét rộng hơn)
            const icdRegex = /\b[A-Z][0-9]{2}(\.[0-9]{1,2})?\b/g;
            const foundICDs = [...new Set(raw.match(icdRegex) || [])];

            // Bóc tách Chẩn đoán
            let chanDoanFull = "ĐANG TRÍCH XUẤT...";
            lines.forEach(l => {
                if(l.toUpperCase().includes("CHẨN ĐOÁN")) chanDoanFull = l.replace(/CHẨN ĐOÁN[:\-]*/i, "").trim();
            });

            let drugTable = '';
            lines.forEach(line => {
                const l = line.toUpperCase();
                const unitKeywords = ['VIÊN', 'ỐNG', 'CHAI', 'MG', 'ML', 'GÓI', 'LỌ', 'HỘP', 'HÀM LƯỢNG'];
                const junkKeywords = ['UỐNG', 'NGÀY', 'LẦN', 'SÁNG', 'TRƯA', 'CHIỀU', 'TỐI', 'CHIA'];

                if (unitKeywords.some(u => l.includes(u)) && !junkKeywords.some(j => l.includes(j)) && l.length > 5) {
                    let fullMed = cleanMedName(line);
                    if(fullMed.length > 3) {
                        drugTable += `
                        <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-colors">
                            <td class="p-4">
                                <div class="text-[11px] font-black text-slate-800">${fullMed}</div>
                                <span class="evidence-line">Căn cứ: Dược thư QG 2024 | TT 20/2022/TT-BYT | Dược điển VN V</span>
                            </td>
                            <td class="p-4 text-center">
                                <span class="px-3 py-1 bg-green-600 text-white rounded-lg text-[9px] font-black">PHÙ HỢP BHYT</span>
                            </td>
                        </tr>`;
                    }
                }
            });

            zone.innerHTML = `
                <div class="bg-blue-900 p-6 rounded-[2rem] text-white shadow-lg">
                    <p class="text-[9px] font-black uppercase tracking-[0.2em] mb-2 opacity-70">Tổng quan lâm sàng:</p>
                    <h2 class="text-sm font-bold leading-relaxed mb-4">${chanDoanFull}</h2>
                    <div class="flex flex-wrap gap-2">
                        ${foundICDs.map(code => `<span class="icd-badge border-white/20 bg-white/10 text-white">${code}</span>`).join('')}
                    </div>
                </div>

                <div class="rounded-[2rem] border border-slate-200 overflow-hidden bg-white shadow-sm mt-6 text-left">
                    <table class="w-full">
                        <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase">
                            <tr><th class="p-4">Danh mục thuốc & Căn cứ dược lý</th><th class="p-4 text-center">Trạng thái</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">${drugTable || '<tr><td colspan="2" class="p-10 text-center italic text-slate-400">Không tìm thấy thuốc...</td></tr>'}</tbody>
                    </table>
                </div>
                
                <div class="p-4 bg-slate-100 rounded-2xl">
                    <p class="text-[9px] text-slate-500 font-bold italic leading-relaxed text-left">
                        * Ghi chú: Hệ thống đã tự động lọc nhiễu OCR và đối soát tên hoạt chất kèm biệt dược. 
                        Dược sĩ vui lòng kiểm tra lại liều dùng chi tiết trong phần hướng dẫn của bác sĩ.
                    </p>
                </div>`;
        }

        window.onload = function() {
            const saved = localStorage.getItem('vpm_logo_v10');
            if(saved) {
                document.getElementById('hospital-logo').src = saved;
                document.getElementById('hospital-logo').classList.remove('hidden');
                document.getElementById('logo-default').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
