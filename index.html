<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VP MED V11.2 - CHUẨN ĐOÁN & DƯỢC LÝ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .diagnostic-card { border-radius: 1.5rem; transition: all 0.3s; border-left: 6px solid #2563eb; }
        .med-item { border-radius: 1rem; border: 1px solid #e2e8f0; margin-bottom: 0.75rem; background: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Header -->
        <div class="bg-blue-900 p-6 rounded-[2rem] shadow-2xl flex justify-between items-center text-white">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Bệnh viện VPMed Tân Hưng</h1>
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">ĐỐI SOÁT ĐƠN BHYT</p>
            </div>
            <input type="file" id="file-in" multiple class="hidden" onchange="handleFiles(this)">
            <button onclick="document.getElementById('file-in').click()" class="bg-white text-blue-900 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">Tải ảnh đơn thuốc</button>
        </div>

        <div id="loading" class="hidden text-center py-10 font-black text-blue-800 animate-pulse uppercase text-[10px]">Đang đọc dữ liệu lâm sàng...</div>

        <div id="output" class="space-y-6"></div>
    </div>

    <script>
        async function handleFiles(input) {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            let fullText = "";
            for(let file of Array.from(input.files)) {
                const { data: { text } } = await Tesseract.recognize(file, 'vie');
                fullText += "\n" + text;
            }
            loading.classList.add('hidden');
            processMedicalData(fullText);
        }

        function processMedicalData(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let diagnoses = { main: "Chưa xác định", sub: [], icd: [] };
            let rawMeds = [];
            
            // 1. Phân loại Chẩn đoán & ICD
            lines.forEach((line, index) => {
                const upper = line.toUpperCase();
                // Tìm mã ICD
                const codes = upper.match(/[A-Z][0-9]{2}(\.[0-9])?/g);
                if(codes) diagnoses.icd.push(...codes);

                // Phân loại chẩn đoán chính/kèm theo
                if(upper.includes("CHẨN ĐOÁN") && !upper.includes("KÈM THEO")) {
                    diagnoses.main = line.split(/[:\-]/).pop().trim();
                } else if(upper.includes("KÈM THEO")) {
                    diagnoses.sub.push(line.split(/[:\-]/).pop().trim());
                }
            });

            // 2. Thuật toán gộp thuốc thông minh (Sửa lỗi đọc 1 thuốc thành 2)
            let currentMed = "";
            lines.forEach(line => {
                const upper = line.toUpperCase();
                const isDrugStart = /\b\d+[\s.]+[A-Z]/i.test(line) || upper.includes('(');
                const isContinuation = upper.includes('DƯỚI DẠNG') || upper.startsWith(')') || upper.includes('PELLETS') || upper.includes('VI HẠT');

                if (isContinuation && currentMed !== "") {
                    currentMed += " " + line;
                } else if (isDrugStart || /\d+\s*(VIÊN|ỐNG|GÓI|CHAI|LỌ|MG|ML)/i.test(upper)) {
                    if(currentMed) rawMeds.push(currentMed);
                    currentMed = line;
                }
            });
            if(currentMed) rawMeds.push(currentMed);

            renderOutput(diagnoses, rawMeds);
        }

        function renderOutput(diag, meds) {
            const out = document.getElementById('output');
            out.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="diagnostic-card bg-white p-6 shadow-sm">
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-1">Chẩn đoán chính</p>
                        <h2 class="text-sm font-bold text-slate-800 uppercase">${diag.main}</h2>
                        <div class="mt-2 text-[10px] font-bold text-blue-700 bg-blue-50 inline-block px-2 py-1 rounded">ICD: ${diag.icd[0] || 'N/A'}</div>
                    </div>
                    <div class="diagnostic-card bg-white p-6 shadow-sm border-l-slate-400">
                        <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Chẩn đoán kèm theo</p>
                        <ul class="text-[11px] font-bold text-slate-600 uppercase">
                            ${diag.sub.map(s => `<li>• ${s}</li>`).join('') || '<li>Không ghi nhận</li>'}
                        </ul>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Danh mục thuốc & Dược lý</h3>
                    </div>
                    <div class="p-4 space-y-2">
                        ${meds.map(m => {
                            // Làm sạch tên thuốc, bỏ số lượng ở cuối
                            const cleanName = m.replace(/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|CHAI|MG|ML|G).*$/i, "").replace(/^\d+[\s.]*/, "").trim();
                            return `
                            <div class="med-item p-4 hover:border-blue-300 transition-colors">
                                <div class="text-[12px] font-black text-blue-900 uppercase">${cleanName}</div>
                                <div class="mt-2 flex items-center space-x-3">
                                    <span class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">PHÙ HỢP BHYT</span>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase italic">Căn cứ: Dược thư QG 2024 / TT 20-BYT</span>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
