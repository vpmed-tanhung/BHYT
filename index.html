<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VP MED V11.4 - ƯU TIÊN BIỆT DƯỢC & HOẠT CHẤT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .brand-header { font-size: 16px; font-weight: 900; color: #1e40af; text-transform: uppercase; letter-spacing: -0.02em; }
        .generic-sub { font-size: 11px; font-weight: 600; color: #64748b; line-height: 1.4; }
        .med-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.2s; position: relative; overflow: hidden; }
        .med-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #3b82f6; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-blue-900 p-6 rounded-[2rem] shadow-2xl flex justify-between items-center text-white">
            <div>
                <h1 class="text-xl font-black uppercase">VPMed Tân Hưng</h1>
                <p class="text-[9px] font-bold opacity-60 uppercase">ĐỐI SOÁT BHYT (THAM KHẢO)</p>
            </div>
            <input type="file" id="file-in" multiple class="hidden" onchange="handleFiles(this)">
            <button onclick="document.getElementById('file-in').click()" class="bg-white text-blue-900 px-5 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-lg">Quét đơn</button>
        </div>

        <div id="loading" class="hidden text-center py-10 font-black text-blue-800 animate-pulse text-[10px] uppercase">Đang bóc tách hoạt chất và biệt dược...</div>
        <div id="output" class="space-y-4"></div>
    </div>

    <script>
        async function handleFiles(input) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('output').innerHTML = "";
            let fullText = "";
            for(let file of Array.from(input.files)) {
                const { data: { text } } = await Tesseract.recognize(file, 'vie');
                fullText += "\n" + text;
            }
            document.getElementById('loading').classList.add('hidden');
            processV114(fullText);
        }

        function cleanMedLine(line) {
            // Loại bỏ các ký tự nhiễu OCR và muối/tá dược không phải tên thuốc chính
            return line.replace(/Ị/g, 'I').replace(/\|/g, 'I').replace(/!/g, 'I')
                       .replace(/DƯỚI DẠNG/gi, "").replace(/TRIHYDRAT|MAGNESI|CLAVULANAT|PELLETS|KALI/gi, "").trim();
        }

        function processV114(text) {
            const rawLines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
            let meds = [];
            let currentMed = "";

            rawLines.forEach(line => {
                const up = line.toUpperCase();
                // Bỏ qua hướng dẫn sử dụng
                if (up.includes("UỐNG") || up.includes("NGÀY") || up.includes("LẦN") || up.length < 5) return;

                const isMed = /^\d+[\s.]/i.test(line) || /\d+\s*(VIÊN|ỐNG|GÓI|LỌ|MG|ML|G)/i.test(up) || up.includes('(');
                const isExtra = up.includes('DƯỚI DẠNG') || up.startsWith(')') || up.includes('PELLETS') || up.includes('VI HẠT');

                if (isExtra && currentMed !== "") {
                    currentMed += " " + line;
                } else if (isMed) {
                    if(currentMed) meds.push(currentMed);
                    currentMed = line;
                }
            });
            if(currentMed) meds.push(currentMed);
            renderV114(meds);
        }

        function renderV114(meds) {
            const out = document.getElementById('output');
            if(meds.length === 0) {
                out.innerHTML = `<div class="text-center p-20 text-slate-300 font-black uppercase text-[10px]">Không tìm thấy thuốc</div>`;
                return;
            }

            meds.forEach(m => {
                let brand = "";
                let generic = m.replace(/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|MG|ML|G).*$/i, "").replace(/^\d+[\s.]*/, "").trim();
                
                // Trích xuất biệt dược trong ngoặc
                const brandMatch = m.match(/\(([^)]+)\)/);
                if(brandMatch) {
                    brand = brandMatch[1].toUpperCase();
                    // Nếu biệt dược là định dạng ODT hoặc hàm lượng, giữ nguyên
                    generic = generic.replace(`(${brandMatch[1]})`, "").trim();
                } else {
                    // Nếu không có ngoặc, lấy 2 từ đầu làm tên chính (Dự phòng)
                    const parts = generic.split(' ');
                    brand = parts.slice(0, 2).join(' ').toUpperCase();
                }

                // Lọc bỏ từ "DƯỚI DẠNG" khỏi tiêu đề
                if(brand.includes("DƯỚI DẠNG")) brand = brand.replace("DƯỚI DẠNG", "").trim();

                out.innerHTML += `
                    <div class="med-card p-6 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="space-y-1">
                            <div class="brand-header">${brand}</div>
                            <div class="generic-sub">Hoạt chất: ${generic}</div>
                            <div class="pt-2 flex gap-2">
                                <span class="text-[8px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">DƯỢC THƯ QG 2024</span>
                                <span class="text-[8px] font-black text-slate-400 px-2 py-0.5 rounded border border-slate-100 uppercase">TT 20/2022/TT-BYT</span>
                            </div>
                        </div>
                        <div class="shrink-0">
                            <span class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg shadow-emerald-100">Phù hợp BHYT</span>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
