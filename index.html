<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPMED V12 - CDSS PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#f1f5f9 }
.card { background:white; border-radius:20px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05)}
.warn { background:#fee2e2; color:#991b1b }
.ok { background:#dcfce7; color:#166534 }
</style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto space-y-6">

<h1 class="text-xl font-black text-blue-900">VPMED V12 – CDSS PRO</h1>

<input type="file" multiple onchange="handleFiles(this)" class="mb-4">

<div id="loading" class="hidden">Đang phân tích...</div>

<div id="result"></div>

</div>

<script>

// ================= DATABASE =================

const DRUG_DB = {
"PARACETAMOL": { group:"Giảm đau", bhyt:true },
"AMOXICILLIN": { group:"Kháng sinh", bhyt:true },
"PREDNISOLONE": { group:"Corticoid", bhyt:true },
"METFORMIN": { group:"Đái tháo đường", bhyt:true }
};

const INTERACTIONS = [
{ a:"PREDNISOLONE", b:"METFORMIN", note:"⚠ Tăng đường huyết" }
];

// ================= OCR =================

async function handleFiles(input) {

document.getElementById("loading").classList.remove("hidden");

let fullText = "";

for(let file of input.files){

const { data:{text} } = await Tesseract.recognize(file,'vie',{
tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-/ ',
preserve_interword_spaces:'1'
});

fullText += text.toUpperCase() + "\n";
}

process(fullText);

}

// ================= PROCESS =================

function process(text){

document.getElementById("loading").classList.add("hidden");

const lines = text.split("\n").map(x=>x.trim()).filter(x=>x);

// ICD
const icd = [...new Set(text.match(/[A-Z][0-9]{2}(\.[0-9]{1,2})?/g) || [])];

// DRUG
let drugs = [];

lines.forEach(l=>{

if(/\d+\s*(MG|ML|G|UI)/.test(l)){

let name = l.split(/\d/)[0].trim();

let key = Object.keys(DRUG_DB).find(d=>name.includes(d));

drugs.push({
raw:name,
key:key || name,
info:DRUG_DB[key] || null
});

}

});

// INTERACTION CHECK

let warnings = [];

INTERACTIONS.forEach(i=>{
if(drugs.find(d=>d.key===i.a) && drugs.find(d=>d.key===i.b)){
warnings.push(i.note);
}
});

// ICD logic

if(icd.includes("E11") && drugs.find(d=>d.key==="PREDNISOLONE")){
warnings.push("⚠ ĐTĐ + Corticoid → tăng glucose");
}

// ================= RENDER =================

let html = "";

// ICD

html += `
<div class="card">
<h2 class="font-bold mb-2">ICD</h2>
${icd.map(i=>`<span class="px-2 py-1 bg-blue-600 text-white mr-2 rounded">${i}</span>`).join("")}
</div>
`;

// DRUG

html += `<div class="card"><h2 class="font-bold mb-2">Thuốc</h2>`;

drugs.forEach(d=>{

html += `
<div class="flex justify-between border-b py-2">
<div>
<div class="font-bold">${d.raw}</div>
<div class="text-xs text-gray-500">${d.info?.group || "Chưa rõ"}</div>
</div>
<div>
<span class="${d.info?.bhyt ? 'ok':'warn'} px-2 py-1 text-xs rounded">
${d.info?.bhyt ? 'BHYT OK':'Check BHYT'}
</span>
</div>
</div>
`;

});

html += "</div>";

// WARNINGS

html += `<div class="card"><h2 class="font-bold mb-2">Cảnh báo</h2>`;

html += warnings.length ? warnings.map(w=>`<div class="warn p-2 rounded mb-2">${w}</div>`).join("") :
"<div class='ok p-2 rounded'>Không có nguy cơ</div>";

html += "</div>";

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
