<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP MED V11.0 - CHUẨN ĐOÁN LÂM SÀNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .icd-card { border-left: 4px solid #2563eb; background: #ffffff; transition: all 0.2s; }
        .icd-card:hover { transform: translateX(5px); }
        .med-row:nth-child(even) { background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="bg-blue-800 p-6 rounded-3xl shadow-2xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Bệnh viện VPMed Tân Hưng</h1>
                <div class="flex items-center space-x-2 mt-1">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <p class="text-[10px] text-blue-100 font-bold uppercase tracking-widest">Hệ thống phân tích đơn thuốc V11.0</p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="document.getElementById('file-in').click()" class="bg-white text-blue-800 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-blue-50 transition-all">Tải ảnh đơn</button>
                <input type="file" id="file-in" multiple class="hidden" onchange="handleFiles(this)">
                <button onclick="location.reload()" class="bg-blue-700 text-white p-3 rounded-2xl hover:bg-blue-600 border border-blue-500/30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5"/></svg>
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-[10px] font-black text-blue-900 uppercase tracking-widest">Đang phân tích sâu dữ liệu...</p>
        </div>

        <div id="result-container" class="space-y-6"></div>
    </div>

    <script>
        async function handleFiles(input) {
            const files = Array.from(input.files);
            if(files.length === 0) return;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-container').innerHTML = '';

            let fullText = "";
            for(let file of files) {
                const { data: { text } } = await Tesseract.recognize(file, 'vie');
                fullText += "\n" + text;
            }
            processData(fullText);
        }

        function cleanText(text) {
            return text.replace(/Ị/g, 'I').replace(/\|/g, 'I').replace(/\[/g, 'I').replace(/!/g, 'I')
                       .replace(/(\n)+/g, '\n').trim();
        }

        function processData(text) {
            document.getElementById('loading').classList.add('hidden');
            const lines = cleanText(text).split('\n');
            const raw = text.toUpperCase();
            
            // 1. Phân loại chẩn đoán
            let chanDoanChinh = "Chưa xác định";
            let chanDoanKemTheo = [];
            let icdCodes = [...new Set(raw.match(/[A-Z][0-9]{2}(\.[0-9])?/g) || [])];

            for(let i=0; i<lines.length; i++) {
                let l = lines[i].toUpperCase();
                if(l.includes("CHẨN ĐOÁN") && !l.includes("KÈM THEO")) {
                    chanDoanChinh = lines[i].split(/[:\-]/)[1] || lines[i];
                }
                if(l.includes("KÈM THEO") || (i > 0 && lines[i-1].toUpperCase().includes("KÈM THEO"))) {
                    chanDoanKemTheo.push(lines[i].replace(/CHẨN ĐOÁN KÈM THEO[:\-]/i, "").trim());
                }
            }

            // 2. Trích xuất thuốc (Tên + Hoạt chất + Biệt dược)
            let drugListHTML = '';
            lines.forEach(line => {
                const l = line.toUpperCase();
                const isDrug = (/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|CHAI|HỘP|MG|ML|G|UI)/i.test(l)) && 
                               !(/SÁNG|TRƯA|CHIỀU|TỐI|NGÀY|UỐNG/i.test(l));
                
                if (isDrug && l.length > 5) {
                    let medName = line.replace(/^\d+[\s.]*/, "").replace(/\d+\s*(VIÊN|GÓI|ỐNG|LỌ|CHAI|HỘP|MG|ML|G|UI).*$/i, "").trim();
                    drugListHTML += `
                    <div class="med-row p-4 flex justify-between items-center border-b border-slate-100">
                        <div class="space-y-1">
                            <div class="text-[12px] font-black text-slate-800 uppercase tracking-tight">${medName}</div>
                            <div class="flex items-center space-x-2">
                                <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">Căn cứ: Dược thư QG 2024</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase">TT 20/2022/TT-BYT</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[9px] font-black uppercase shadow-sm">Phù hợp BHYT</span>
                        </div>
                    </div>`;
                }
            });

            // 3. Render giao diện
            document.getElementById('result-container').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="icd-card p-6 rounded-3xl shadow-lg border border-slate-100">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-2 tracking-widest">Chẩn đoán chính (ICD-10)</p>
                        <h2 class="text-sm font-black text-slate-800 leading-relaxed uppercase">${chanDoanChinh}</h2>
                        <div class="mt-4 flex flex-wrap gap-2">
                            ${icdCodes.slice(0,1).map(c => `<span class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">${c}</span>`).join('')}
                        </div>
                    </div>
                    <div class="icd-card p-6 rounded-3xl shadow-lg border border-slate-100 border-l-slate-400">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Chẩn đoán kèm theo</p>
                        <ul class="text-[11px] font-bold text-slate-600 space-y-1 uppercase">
                            ${chanDoanKemTheo.map(item => `<li>• ${item}</li>`).join('') || '<li>Không có</li>'}
                        </ul>
                        <div class="mt-4 flex flex-wrap gap-2">
                            ${icdCodes.slice(1).map(c => `<span class="bg-slate-200 text-slate-700 px-3 py-1 rounded-lg text-[10px] font-black">${c}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200">
                    <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Danh mục thuốc & Căn cứ dược lý</h3>
                        <span class="text-[9px] font-bold text-slate-400 italic">VPMed Tân Hưng Analyzer</span>
                    </div>
                    <div class="divide-y divide-slate-50">${drugListHTML || '<div class="p-10 text-center text-slate-300 font-bold uppercase text-[10px]">Không tìm thấy dữ liệu thuốc</div>'}</div>
                </div>`;
        }
    </script>
</body>
</html>
